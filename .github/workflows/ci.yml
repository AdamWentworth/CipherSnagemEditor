name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CipherSnagemEditor.slnx

      - name: Build
        run: dotnet build CipherSnagemEditor.slnx --no-restore

      - name: Test
        run: dotnet test CipherSnagemEditor.slnx --no-build
