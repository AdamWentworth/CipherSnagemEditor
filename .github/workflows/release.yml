name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version="${{ github.ref_name }}"
            version="${version#v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  verify:
    name: Build and test
    needs: version
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build CipherSnagemEditor.slnx

      - name: Test
        run: dotnet test CipherSnagemEditor.slnx --no-build

  package-windows:
    name: Package Windows builds
    needs:
      - version
      - verify
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Windows builds
        shell: pwsh
        run: |
          .\scripts\publish-windows.ps1 -Tool Colosseum -Runtime win-x64 -PackageVersion "${{ needs.version.outputs.version }}"
          .\scripts\publish-windows.ps1 -Tool GoD -Runtime win-x64 -PackageVersion "${{ needs.version.outputs.version }}"

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: artifacts/packages/*.zip
          if-no-files-found: error

  package-linux:
    name: Package Linux builds
    needs:
      - version
      - verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Publish Linux builds
        shell: bash
        run: |
          bash scripts/publish-linux.sh Colosseum linux-x64 "${{ needs.version.outputs.version }}"
          bash scripts/publish-linux.sh GoD linux-x64 "${{ needs.version.outputs.version }}"

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            artifacts/packages/*.tar.gz
            artifacts/packages/*.deb
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - version
      - package-windows
      - package-linux
    runs-on: ubuntu-latest

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Cipher Snagem Editor
          body: |
            ## Recommended Downloads

            Choose one tool and one platform:

            ### Windows

            Portable builds. Extract the zip, then run `ColosseumTool.exe` or `GoDTool.exe`.

            - Colosseum Tool: `colosseum-tool-windows-portable-x64.zip`
            - GoD Tool / Pokemon XD: `god-tool-windows-portable-x64.zip`

            ### Ubuntu / Debian Linux

            Installer packages with app launcher and icon integration.

            - Colosseum Tool: `colosseum-tool-ubuntu-debian-x64.deb`
            - GoD Tool / Pokemon XD: `god-tool-ubuntu-debian-x64.deb`

            ### Other Linux / Portable Linux

            Portable archives. Extract, `chmod +x`, and run the included launcher script.

            - Colosseum Tool: `colosseum-tool-linux-portable-x64.tar.gz`
            - GoD Tool / Pokemon XD: `god-tool-linux-portable-x64.tar.gz`

            No game files are included.

            These downloads are intentionally attached to GitHub Releases. The
            GitHub Packages tab is for developer package registries, not normal
            desktop app downloads.
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
