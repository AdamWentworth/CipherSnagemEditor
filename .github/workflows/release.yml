name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then
            version="${{ github.ref_name }}"
            version="${version#v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  verify:
    name: Build and test
    needs: version
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build CipherSnagemEditor.slnx

      - name: Test
        run: dotnet test CipherSnagemEditor.slnx --no-build

  package-windows:
    name: Package Windows builds
    needs:
      - version
      - verify
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Windows builds
        shell: pwsh
        run: |
          .\scripts\publish-windows.ps1 -Tool Colosseum -Runtime win-x64 -PackageVersion "${{ needs.version.outputs.version }}"
          .\scripts\publish-windows.ps1 -Tool GoD -Runtime win-x64 -PackageVersion "${{ needs.version.outputs.version }}"

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: artifacts/packages/*-${{ needs.version.outputs.version }}.zip
          if-no-files-found: error

  package-linux:
    name: Package Linux builds
    needs:
      - version
      - verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Publish Linux builds
        shell: pwsh
        run: |
          ./scripts/publish-linux.ps1 -Tool Colosseum -Runtime linux-x64 -PackageVersion "${{ needs.version.outputs.version }}" -NoReadyToRun
          ./scripts/publish-linux.ps1 -Tool GoD -Runtime linux-x64 -PackageVersion "${{ needs.version.outputs.version }}" -NoReadyToRun

          Copy-Item `
            -LiteralPath artifacts/packages/colosseum-tool-linux-x64.tar.gz `
            -DestinationPath "artifacts/packages/colosseum-tool-linux-x64-${{ needs.version.outputs.version }}.tar.gz" `
            -Force

          Copy-Item `
            -LiteralPath artifacts/packages/god-tool-linux-x64.tar.gz `
            -DestinationPath "artifacts/packages/god-tool-linux-x64-${{ needs.version.outputs.version }}.tar.gz" `
            -Force

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            artifacts/packages/*-${{ needs.version.outputs.version }}.tar.gz
            artifacts/packages/*-${{ needs.version.outputs.version }}.deb
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - version
      - package-windows
      - package-linux
    runs-on: ubuntu-latest

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: Cipher Snagem Editor v${{ needs.version.outputs.version }}
          body: |
            Download the package for the tool and platform you want:

            - `colosseum-tool-win-x64-${{ needs.version.outputs.version }}.zip`
            - `god-tool-win-x64-${{ needs.version.outputs.version }}.zip`
            - `cipher-snagem-colosseum-tool-linux-x64-${{ needs.version.outputs.version }}.deb`
            - `cipher-snagem-god-tool-linux-x64-${{ needs.version.outputs.version }}.deb`
            - portable Linux `.tar.gz` packages are also attached.

            No game files are included.
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
